<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWard | El Origen</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/logo.png" type="image/png">
</head>
<body>
    <div class="background-master">
        <div class="grid-floor"></div>
    </div>

    <header>
        <a href="index.html" class="logo-container">
            <img src="img/logo.png" alt="PolyWard Logo" class="main-logo">
        </a>
        <nav>
            <a href="index.html" class="active">INICIO</a>
            <a href="descubrir.html">DESCUBRIR</a>
            <a href="sobre.html">SOBRE</a>
            <a href="login.html">LOGIN</a>
        </nav>
    </header>
    <main class="content-container">
        <div class="shield-container">
            <svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" class="stop-blue-light"/>
                        <stop offset="100%" class="stop-blue-dark"/>
                    </linearGradient>
                </defs>
                <path d="M100 5L25 45V115C25 175 100 235 100 235C100 235 175 175 175 115V45L100 5Z" class="shield-path"/>
                <rect x="70" y="80" width="60" height="60" class="shield-rect" transform="rotate(45 100 110)"/>
                <path d="M100 70V150M65 110H135" class="shield-lines"/>
            </svg>
        </div>
        <h1>ACCESO AL SISTEMA</h1>
        <form class="login-form">
            <input type="text" placeholder="OPERADOR" required>
            <input type="password" placeholder="CONTRASEÑA" required>
            <button type="submit" class="nav-status">ENTRAR</button>
        </form>
    </main>
</body>
</html>
