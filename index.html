<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWard | Geometric Universe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-master">
        <div class="stars"></div>
        <div class="grid-floor"></div>
        
        <div class="shapes-container">
            <div class="shape square red" style="--i:1; --t:10s"></div>
            <div class="shape square red" style="--i:5; --t:12s"></div>
            <div class="shape triangle yellow" style="--i:2; --t:15s"></div>
            <div class="shape triangle yellow" style="--i:6; --t:18s"></div>
            <div class="shape circle blue" style="--i:3; --t:20s"></div>
            <div class="shape circle blue" style="--i:7; --t:14s"></div>
            
            <div class="shape square red" style="--i:4; --t:25s"></div>
            <div class="shape triangle yellow" style="--i:8; --t:22s"></div>
        </div>
        
        <div class="center-glow"></div>
    </div>

    <header>
        <div class="logo">POLY<span>WARD</span></div>
        <nav>
            <a href="#">SOBRE</a>
            <a href="#">DESCUBRIR</a>
            <a href="#" class="nav-login">LOGIN</a>
        </nav>
    </header>

    <main class="hero">
        <div class="shield">🛡️</div>
        <h1>POLY<span>WARD</span></h1>
        <p>EL COMIENZO DE LA DEFENSA GEOMÉTRICA</p>
        <button class="play-btn">JUGAR AHORA</button>
    </main>

</body>
</html>
